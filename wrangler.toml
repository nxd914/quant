name = "kinzie"
compatibility_date = "2024-01-01"

# Cloudflare Pages — static site, no build step.
# Publish directory: repo root (index.html + static assets).
# Connect this repo in the CF Pages dashboard:
#   Build command: (leave blank)
#   Build output directory: /
#   Root directory: /
#
# Custom domain: kinzie.com → add CNAME in Cloudflare DNS pointing to
# your Pages project URL (e.g. kinzie.pages.dev).

[site]
bucket = "."
