services:
  - type: web
    name: vequil
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: env PYTHONPATH=src gunicorn -k uvicorn.workers.UvicornWorker vequil.asgi:app
    envVars:
      - key: DASHBOARD_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: PORT
        value: 10000
      - key: VEQUIL_REQUIRE_AUTH
        value: "1"
