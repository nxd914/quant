<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#0a1628;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Wordmark -->
  <text x="80" y="120" font-family="Georgia, serif" font-size="32" font-weight="600"
        fill="rgba(255,255,255,0.5)" letter-spacing="8">KINZIE</text>

  <!-- Divider -->
  <rect x="80" y="148" width="60" height="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Headline -->
  <text x="80" y="260" font-family="Georgia, serif" font-size="72" font-weight="400"
        fill="#ffffff">Precision at the edge</text>
  <text x="80" y="350" font-family="Georgia, serif" font-size="72" font-weight="400"
        fill="#ffffff">of information</text>

  <!-- Subline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="24" font-weight="300"
        fill="rgba(255,255,255,0.6)">Proprietary trading research. Deterministic execution.</text>

  <!-- Bottom stats -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.3)">N(d2) pricing · 0.66 µs</text>
  <text x="360" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.3)">Welford vol · 1.5 µs</text>
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.3)">Kelly sizing · 0.49 µs</text>
  <text x="900" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.3)">github.com/nxd914/kinzie</text>
</svg>
<!-- Export to og-image.png (1200x630) for broadest social share compatibility -->
